services:

  librechat-mongodb:
    image: mongo:7
    container_name: librechat-mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    command: >
      mongod
      --wiredTigerCacheSizeGB 4
      --bind_ip_all
    networks:
      - ai-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - ai-network
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

