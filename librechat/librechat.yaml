version: 1.3.13

cache: true

config:
  ui:
    appTitle: "Sonar IA"
    logo: "https://url-de-tu-servidor.com/ruta/a/tu/logo.svg"

endpoints:
  custom:
    - name: "T-Models"
      apiKey: "dummy"
      baseURL: "http://cerebro:9000/v1"
      models:
        default: ["cuentos-tinyllama"]
        fetch: true
      titleConvo: false
      titleModel: "current_model"
      titleMethod: "completion"
      titleMessageRole: "user"
      titlePrompt: |
        Provide a concise title (5 words max) for this conversation. Only return the title, nothing else:
        {convo}
      summarize: false
      summaryModel: "current_model"
      headers:
        X-User-ID: "{{LIBRECHAT_USER_ID}}"
        X-User-Name: "{{LIBRECHAT_USER_NAME}}"
        X-User-Email: "{{LIBRECHAT_USER_EMAIL}}"
        X-Conversation-ID: "{{LIBRECHAT_BODY_CONVERSATIONID}}"