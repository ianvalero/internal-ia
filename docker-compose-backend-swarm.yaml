version: '3.8'

services:

  librechat-mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    command: >
      mongod
      --wiredTigerCacheSizeGB 4
      --bind_ip_all
    networks:
      - ai-network
    deploy:
      restart_policy:
        condition: any

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - ai-network
    volumes:
      - qdrant_storage:/qdrant/storage
    deploy:
      restart_policy:
        condition: any

  cerebro:
    image: ia-cerebro:latest
    environment:
      HF_HUB_OFFLINE: ${CEREBRO_HF_HUB_OFFLINE:-1}
      TRANSFORMERS_OFFLINE: ${CEREBRO_TRANSFORMERS_OFFLINE:-1}
      HF_DATASETS_OFFLINE: ${CEREBRO_HF_DATASETS_OFFLINE:-1}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL}
    ports:
      - "9001:9000"
    networks:
      - ai-network
      - langfuse-network
    volumes:
      - ./cerebro:/app/cerebro
      - ./models:/models:ro
      - ./models.yaml:/app/cerebro/config/models.yaml
    deploy:
      restart_policy:
        condition: any

