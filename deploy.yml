---
- name: Deploy ia-backend stack
  hosts: dtz_srv_vmwz919
  become: true
  gather_facts: false
  vars:
    stack_name: ia-backend
    compose_file: docker-compose-backend.yaml
    stacks_path: /data/docker/stacks/internal-ia
    service_wait_timeout: 300   # segundos máximos esperando a que un servicio esté running
    minio_init_timeout: 120     # segundos máximos esperando a que minio-init complete

  tasks:

    - name: "[backend] Comprobar que existe el fichero .env"
      stat:
        path: "{{ stacks_path }}/.env"
      register: env_file

    - name: "[backend] Fallar si no existe el .env"
      fail:
        msg: "No existe el fichero .env en {{ stacks_path }}. Abortando despliegue."
      when: not env_file.stat.exists

    - name: "[backend] Comprobar si el stack {{ stack_name }} existe"
      command: docker stack ls --format "{{ '{{' }}.Name{{ '}}' }}"
      register: existing_stacks
      changed_when: false

    - name: "[backend] Eliminar stack existente {{ stack_name }}"
      command: docker stack rm {{ stack_name }}
      when: stack_name in existing_stacks.stdout_lines

    - name: "[backend] Esperar a que el stack desaparezca completamente"
      shell: docker stack ls --format "{{ '{{' }}.Name{{ '}}' }}" | grep -c "^{{ stack_name }}$" || true
      register: stack_gone
      until: stack_gone.stdout == "0"
      retries: 30
      delay: 5
      when: stack_name in existing_stacks.stdout_lines

    - name: "[backend] Desplegar stack {{ stack_name }}"
      shell: |
        set -a
        source {{ stacks_path }}/.env
        set +a
        
        docker stack deploy \
        --compose-file {{ stacks_path }}/{{ compose_file }} \
        --with-registry-auth \
        --detach=true \
        {{ stack_name }}
      args:
        chdir: "{{ stacks_path }}"
      register: deploy_result
      retries: 10
      delay: 5
      until: deploy_result.rc == 0

    - name: "[backend] Esperar a que los servicios estén running"
      shell: docker service ls --format "{{ '{{' }}.Name{{ '}}' }} {{ '{{' }}.Replicas{{ '}}' }}" | awk '$1=="{{ stack_name }}_{{ item }}"{print $2}'
      register: svc_replicas
      until: >
        svc_replicas.stdout is match("^[1-9][0-9]*/[1-9][0-9]*$") and
        svc_replicas.stdout.split('/')[0] == svc_replicas.stdout.split('/')[1]
      retries: "{{ (service_wait_timeout / 10) | int }}"
      delay: 10
      changed_when: false
      loop:
        - langfuse-postgres
        - langfuse-clickhouse
        - langfuse-redis
        - langfuse-minio

    - name: "[backend] Esperar a que minio-init complete"
      shell: docker service ps {{ stack_name }}_langfuse-minio-init --no-trunc --format "{{ '{{' }}.CurrentState{{ '}}' }}"
      register: minio_state
      until: minio_state.stdout is search("Complete")
      retries: "{{ (minio_init_timeout / 10) | int }}"
      delay: 10
      changed_when: false

    - name: "[backend] Verificar exit code de minio-init"
      shell: docker service ps {{ stack_name }}_langfuse-minio-init --no-trunc --format "{{ '{{' }}.ExitCode{{ '}}' }}"
      register: minio_exit
      changed_when: false
      failed_when: "'1' in minio_exit.stdout or '127' in minio_exit.stdout"

    - name: "[backend] Esperar al resto de servicios del backend"
      shell: docker service ls --format "{{ '{{' }}.Name{{ '}}' }} {{ '{{' }}.Replicas{{ '}}' }}" | awk '$1=="{{ stack_name }}_{{ item }}"{print $2}'
      register: svc_replicas
      until: >
        svc_replicas.stdout is match("^[1-9][0-9]*/[1-9][0-9]*$") and
        svc_replicas.stdout.split('/')[0] == svc_replicas.stdout.split('/')[1]
      retries: "{{ (service_wait_timeout / 10) | int }}"
      delay: 10
      changed_when: false
      loop:
        - cerebro
        - librechat-mongodb
        - qdrant

    - name: "[backend] fases 1-3 completadas"
      debug:
        msg: >
          Stack {{ stack_name }} desplegado. 
          Langfuse-worker pendiente (se escala tras el frontend).


- name: Deploy ia-frontend stack
  hosts: dtz_srv_vmwz874
  become: true
  gather_facts: false
  vars:
    stack_name: ia-frontend
    compose_file: docker-compose-frontend.yaml
    stacks_path: /data/docker/stacks/internal-ia
    service_wait_timeout: 300

  tasks:

    - name: "[frontend] Comprobar si el stack {{ stack_name }} existe"
      command: docker stack ls --format "{{ '{{' }}.Name{{ '}}' }}"
      register: existing_stacks
      changed_when: false

    - name: "[frontend] Eliminar stack existente {{ stack_name }}"
      command: docker stack rm {{ stack_name }}
      when: stack_name in existing_stacks.stdout_lines

    - name: "[frontend] Esperar a que el stack desaparezca completamente"
      shell: docker stack ls --format "{{ '{{' }}.Name{{ '}}' }}" | grep -c "^{{ stack_name }}$" || true
      register: stack_gone
      until: stack_gone.stdout == "0"
      retries: 30
      delay: 5
      when: stack_name in existing_stacks.stdout_lines

    - name: "[frontend] Desplegar stack {{ stack_name }}"
      shell: |
        set -a
        source {{ stacks_path }}/.env
        set +a
        
        docker stack deploy \
        --compose-file {{ stacks_path }}/{{ compose_file }} \
        --with-registry-auth \
        --detach=true \
        {{ stack_name }}
      args:
        chdir: "{{ stacks_path }}"

    - name: "[Frontend] Esperar a que los servicios del frontend estén running"
      shell: docker service ls --format "{{ '{{' }}.Name{{ '}}' }} {{ '{{' }}.Replicas{{ '}}' }}" | awk '$1=="{{ stack_name }}_{{ item }}"{print $2}'
      register: svc_replicas
      until: >
        svc_replicas.stdout is match("^[1-9][0-9]*/[1-9][0-9]*$") and
        svc_replicas.stdout.split('/')[0] == svc_replicas.stdout.split('/')[1]
      retries: "{{ (service_wait_timeout / 10) | int }}"
      delay: 10
      changed_when: false
      loop:
        - langfuse-web
        - librechat

    - name: "[frontend] Despliegue completado"
      debug:
        msg: "Stack {{ stack_name }} desplegado. Langfuse-web y Librechat están running."


- name: Escalar langfuse-worker tras el frontend
  hosts: dtz_srv_vmwz919
  become: true
  gather_facts: false
  vars:
    stack_name: ia-backend
    service_wait_timeout: 300

  tasks:

    - name: "[backend] Escalar langfuse-worker a 1 réplica"
      command: docker service scale {{ stack_name }}_langfuse-worker=1

    - name: "[backend] Esperar a que langfuse-worker esté running"
      shell: docker service ls --format "{{ '{{' }}.Name{{ '}}' }} {{ '{{' }}.Replicas{{ '}}' }}" | awk '$1=="{{ stack_name }}_{{ item }}"{print $2}'
      register: svc_replicas
      until: >
        svc_replicas.stdout is match("^[1-9][0-9]*/[1-9][0-9]*$") and
        svc_replicas.stdout.split('/')[0] == svc_replicas.stdout.split('/')[1]
      retries: "{{ (service_wait_timeout / 10) | int }}"
      delay: 10
      changed_when: false

    - name: "[backend] Despliegue completo"
      debug:
        msg: Todos los servicios están running.