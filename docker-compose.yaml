services:

  vllm:
    image: dustynv/vllm:r36.4.0
    ports:
      - "8000:8000"
    volumes:
      - ./hf_cache:/root/.cache/huggingface
    environment:
      VLLM_CPU_KVCACHE_SPACE: ${VLLM_CPU_KVCACHE_SPACE}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES}

      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE}
      HF_DATASETS_OFFLINE: ${HF_DATASETS_OFFLINE}

      OMP_NUM_THREADS: ${OMP_NUM_THREADS}
      VLLM_WORKER_MULTIPROC_METHOD: ${VLLM_WORKER_MULTIPROC_METHOD}

      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
      http_proxy: ${HTTP_PROXY}
      https_proxy: ${HTTPS_PROXY}
      no_proxy: ${NO_PROXY}
    command: >
      TinyLlama/TinyLlama-1.1B-Chat-v1.0
      --host 0.0.0.0
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    depends_on:
      vllm:
        condition: service_healthy
      mongodb:
        condition: service_started
      qdrant:
        condition: service_started
      cerebro:
        condition: service_started
    environment:
      HOST: ${HOST}
      PORT: ${PORT}
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ALLOW_EMAIL_LOGIN: ${ALLOW_EMAIL_LOGIN}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION}
      RAG_API_URL: ${RAG_API_URL}
      NODE_OPTIONS: ${NODE_OPTIONS}
    volumes:
      - librechat_images:/app/client/public/images
      - ./librechat.yaml:/app/librechat.yaml
    networks:
      - ai-network
      - traefik-network
    labels:
      - "traefik.enable=true"

      - # Router HTTPS
      - "traefik.http.routers.librechat.rule=Host(`librechat.local.ia.com`)"
      - "traefik.http.routers.librechat.entrypoints=websecure"
      - "traefik.http.routers.librechat.tls.certresolver=le"

      - # Puerto interno del contenedor
      - "traefik.http.services.librechat.loadbalancer.server.port=3080"

      - # Redirect HTTP -> HTTPS
      - "traefik.http.routers.librechat-http.rule=Host(`librechat.local.ia.com`)"
      - "traefik.http.routers.librechat-http.entrypoints=web"
      - "traefik.http.routers.librechat-http.middlewares=redirect-https"

      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"

    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: librechat-mongo
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    command: >
      mongod
      --wiredTigerCacheSizeGB 4
      --bind_ip_all
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 15s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: ${QDRANT__SERVICE__GRPC_PORT}
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: ${QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS}
      QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB: ${QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB}
    networks:
      - ai-network
    volumes:
      - qdrant_storage:/qdrant/storage
      - ./qdrant_config.yaml:/qdrant/config/production.yaml
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6333/healthz" ]
      interval: 15s
      timeout: 5s
      retries: 3

  cerebro:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
    container_name: cerebro
    environment:
      HF_HUB_OFFLINE: ${CEREBRO_HF_HUB_OFFLINE}
      TRANSFORMERS_OFFLINE: ${CEREBRO_TRANSFORMERS_OFFLINE}
      HF_DATASETS_OFFLINE: ${CEREBRO_HF_DATASETS_OFFLINE}
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT}
      OMP_NUM_THREADS: ${CEREBRO_OMP_NUM_THREADS}
      VLLM_BASE_URL: ${VLLM_BASE_URL}
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
      http_proxy: ${HTTP_PROXY}
      https_proxy: ${HTTPS_PROXY}
      no_proxy: ${NO_PROXY}
    ports:
      - "9000:9000"
    depends_on:
      vllm:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - ai-network
    volumes:
      - ./cerebro:/app/cerebro
      - ./hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=test@dominio.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - traefik-network
    restart: unless-stopped

volumes:
  mongo_data:
  librechat_images:
  qdrant_storage:
networks:
  ai-network:
    driver: bridge
  traefik-network:
    driver: bridge