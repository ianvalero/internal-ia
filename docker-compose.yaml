services:

  vllm:
    image: hellohal2064/vllm-dgx-spark-gb10:latest
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./models:/models:ro
      - flashinfer-cache:/root/.cache/flashinfer
      - vllm-cache:/root/.cache/vllm
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES}

      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE}
      HF_DATASETS_OFFLINE: ${HF_DATASETS_OFFLINE}

      OMP_NUM_THREADS: ${OMP_NUM_THREADS}
      VLLM_WORKER_MULTIPROC_METHOD: ${VLLM_WORKER_MULTIPROC_METHOD}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM}

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-}

      MODEL_PATH: ${MODEL_PATH}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN}
      GPU_MEMORY_UTIL: ${GPU_MEMORY_UTIL}
      ATTENTION_BACKEND: ${ATTENTION_BACKEND}
      HOST: ${VLLM_HOST}
      PORT: ${VLLM_PORT}
    command: >
      --host  ${VLLM_HOST}
      --port ${VLLM_PORT}
      --dtype bfloat16
      --max-model-len ${MAX_MODEL_LEN}
      --gpu-memory-utilization ${GPU_MEMORY_UTIL}
      --enable-prefix-caching
      --max-num-seqs ${MAX_NUM_SEQS}
      --reasoning-parser ""
      --default-chat-template-kwargs '{"enable_thinking": false}'
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    ports:
      - "3080:3080"
    depends_on:
      vllm:
        condition: service_healthy
      mongodb:
        condition: service_started
      qdrant:
        condition: service_started
      cerebro:
        condition: service_started
    environment:
      HOST: ${LIBRECHAT_HOST}
      PORT: ${LIBRECHAT_PORT}
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ALLOW_EMAIL_LOGIN: ${ALLOW_EMAIL_LOGIN}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION}
      RAG_API_URL: ${RAG_API_URL}
      NODE_OPTIONS: ${NODE_OPTIONS}
    volumes:
      - librechat_images:/app/client/public/images
      - ./librechat.yaml:/app/librechat.yaml
    networks:
      - ai-network
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: librechat-mongo
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    command: >
      mongod
      --wiredTigerCacheSizeGB 4
      --bind_ip_all
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 15s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: ${QDRANT__SERVICE__GRPC_PORT}
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: ${QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS}
      QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB: ${QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB}
    networks:
      - ai-network
    volumes:
      - qdrant_storage:/qdrant/storage
      - ./qdrant_config.yaml:/qdrant/config/production.yaml
    restart: unless-stopped

  cerebro:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
    container_name: cerebro
    environment:
      HF_HUB_OFFLINE: ${CEREBRO_HF_HUB_OFFLINE}
      TRANSFORMERS_OFFLINE: ${CEREBRO_TRANSFORMERS_OFFLINE}
      HF_DATASETS_OFFLINE: ${CEREBRO_HF_DATASETS_OFFLINE}
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT}
      OMP_NUM_THREADS: ${CEREBRO_OMP_NUM_THREADS}
      VLLM_BASE_URL: ${VLLM_BASE_URL}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-}
    ports:
      - "9000:9000"
    depends_on:
      vllm:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - ai-network
    volumes:
      - ./cerebro:/app/cerebro
      - ./hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  mongo_data:
  librechat_images:
  qdrant_storage:
  flashinfer-cache:
  vllm-cache:

networks:
  ai-network:
    driver: bridge