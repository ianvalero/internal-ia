services:

  vllm:
    image: hellohal2064/vllm-dgx-spark-gb10:latest
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./models:/models:ro
      - flashinfer-cache:/root/.cache/flashinfer
      - vllm-cache:/root/.cache/vllm
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES}

      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE}
      HF_DATASETS_OFFLINE: ${HF_DATASETS_OFFLINE}

      OMP_NUM_THREADS: ${OMP_NUM_THREADS}
      VLLM_WORKER_MULTIPROC_METHOD: ${VLLM_WORKER_MULTIPROC_METHOD}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM}

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-}

      MODEL_PATH: ${MODEL_PATH}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN}
      GPU_MEMORY_UTIL: ${GPU_MEMORY_UTIL}
      ATTENTION_BACKEND: ${ATTENTION_BACKEND}
      HOST: ${VLLM_HOST}
      PORT: ${VLLM_PORT}
    command: >
      --host  ${VLLM_HOST}
      --port ${VLLM_PORT}
      --dtype bfloat16
      --max-model-len ${MAX_MODEL_LEN}
      --gpu-memory-utilization ${GPU_MEMORY_UTIL}
      --enable-prefix-caching
      --max-num-seqs ${MAX_NUM_SEQS}
      --reasoning-parser ""
      --default-chat-template-kwargs '{"enable_thinking": false}'
      --served-model-name qwen2.5-14b
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${VLLM_PORT}/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

  vllm-embedding:
    image: hellohal2064/vllm-dgx-spark-gb10:latest
    runtime: nvidia
    ports:
      - "8001:8001"
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./models:/models:ro
      - flashinfer-cache:/root/.cache/flashinfer
      - vllm-cache:/root/.cache/vllm
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES}
      HF_HUB_OFFLINE: 1
      TRANSFORMERS_OFFLINE: 1
      ATTENTION_BACKEND: FLASHINFER
      MODEL_PATH: ${EMBEDDING_MODEL_PATH}
      OMP_NUM_THREADS: ${EMBEDDING_OMP_NUM_THREADS}

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-}

    command: >
      --host ${VLLM_EMBEDDING_HOST}
      --port ${VLLM_EMBEDDING_PORT}
      --task embed
      --dtype ${EMBEDDING_DTYPE}
      --max-model-len ${EMBEDDING_MAX_MODEL_LEN}
      --gpu-memory-utilization ${EMBEDDING_GPU_MEMORY_UTIL}
      --trust-remote-code
      --served-model-name embedding
      --uvicorn-log-level warning
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${VLLM_EMBEDDING_PORT}/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  vllm-cache:
  flashinfer-cache:
    name: ia_flashinfer-cache

networks:
  ai-network:
    driver: bridge