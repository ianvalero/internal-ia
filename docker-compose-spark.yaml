services:

  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./models:/models:ro
      - flashinfer-cache:/root/.cache/flashinfer
      - vllm-cache:/root/.cache/vllm
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES}

      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE}
      TRANSFORMERS_OFFLINE: ${HF_TRANSFORMERS_OFFLINE}
      HF_DATASETS_OFFLINE: ${HF_DATASETS_OFFLINE}

      OMP_NUM_THREADS: ${VLLM_OMP_NUM_THREADS}
      VLLM_WORKER_MULTIPROC_METHOD: ${VLLM_WORKER_MULTIPROC_METHOD}
      TOKENIZERS_PARALLELISM: ${VLLM_TOKENIZERS_PARALLELISM}

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-}
      
      ATTENTION_BACKEND: FLASHINFER
      HOST: ${VLLM_HOST}
      PORT: ${VLLM_PORT}
    command: >
      --host  ${VLLM_HOST}
      --port ${VLLM_PORT}
      --model ${VLLM_MODEL_PATH}
      --dtype ${VLLM_DTYPE}
      --max-model-len ${VLLM_MAX_MODEL_LEN}
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTIL}
      --enable-prefix-caching
      --max-num-seqs ${VLLM_MAX_NUM_SEQS}
      --reasoning-parser ""
      --default-chat-template-kwargs '{"enable_thinking": false}'
      --served-model-name llm_model
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${VLLM_PORT}/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

  vllm-embedding:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ports:
      - "8001:8001"
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./models:/models:ro
      - flashinfer-cache:/root/.cache/flashinfer
      - vllm-cache:/root/.cache/vllm
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES}

      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE}
      TRANSFORMERS_OFFLINE: ${HF_TRANSFORMERS_OFFLINE}
      HF_DATASETS_OFFLINE: ${HF_DATASETS_OFFLINE}

      ATTENTION_BACKEND: FLASHINFER
      OMP_NUM_THREADS: ${EMBEDDING_OMP_NUM_THREADS}
    command: >
      --host ${EMBEDDING_HOST}
      --port ${EMBEDDING_PORT}
      --model ${EMBEDDING_MODEL_PATH}
      --dtype ${EMBEDDING_DTYPE}
      --gpu-memory-utilization ${EMBEDDING_GPU_MEMORY_UTIL}
      --max-model-len ${EMBEDDING_MAX_MODEL_LEN}
      --served-model-name embedding_model
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${EMBEDDING_PORT}/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  vllm-cache:
  flashinfer-cache:
    name: ia_flashinfer-cache

networks:
  ai-network:
    driver: bridge